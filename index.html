                <div class="social-group">
                    <a href="https://t.me/neistv" target="_blank" class="social-pill" id="telegram-link">
                        <i class="fa-brands fa-telegram"></i>
                    </a>
                    <a href="#" class="social-pill" id="discord-btn">
                        <i class="fa-brands fa-discord"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="discord-modal">
        <div class="modal">
            <h3>Discord Username</h3>
            <div class="discord-id">
                <span>neist</span>
            </div>
            <button class="copy-btn" id="copy-btn">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        
        function updateCursorPosition(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        }
        
        function handleMouseDown() {
            cursor.classList.add('clicked');
            const clickEffect = document.createElement('div');
            clickEffect.className = 'click-effect';
            clickEffect.style.left = mouseX + 'px';
            clickEffect.style.top = mouseY + 'px';
            clickEffect.style.width = '30px';
            clickEffect.style.height = '30px';
            document.body.appendChild(clickEffect);
            setTimeout(() => {
                if (clickEffect.parentNode) clickEffect.parentNode.removeChild(clickEffect);
            }, 500);
        }
        
        function handleMouseUp() {
            cursor.classList.remove('clicked');
        }
        
        document.addEventListener('mousemove', updateCursorPosition);
        document.addEventListener('mousedown', handleMouseDown);
        document.addEventListener('mouseup', handleMouseUp);
        document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
        document.addEventListener('mouseenter', () => cursor.style.opacity = '1');
        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('dragstart', (e) => e.preventDefault());

        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            preloader.style.opacity = '0';
            setTimeout(() => preloader.remove(), 600);
        });

        const discordBtn = document.getElementById('discord-btn');
        const discordModal = document.getElementById('discord-modal');
        const copyBtn = document.getElementById('copy-btn');
        
        discordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            discordModal.classList.add('active');
        });
        
        discordModal.addEventListener('click', (e) => {
            if (e.target === discordModal) discordModal.classList.remove('active');
        });
        
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText('neist').then(() => {
                copyBtn.textContent = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = 'Copy to Clipboard';
                    copyBtn.classList.remove('copied');
                }, 1500);
            });
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && discordModal.classList.contains('active')) {
                discordModal.classList.remove('active');
            }
        });

        const telegramLink = document.getElementById('telegram-link');
        
        telegramLink.addEventListener('click', (e) => {
            e.preventDefault();
            const url = telegramLink.href;
            
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.style.zIndex = '99999';
            canvas.style.pointerEvents = 'none';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let cx = canvas.width / 2;
            let cy = canvas.height / 2;
            
            let stars = [];
            for(let i=0; i<600; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * canvas.width * 2,
                    y: (Math.random() - 0.5) * canvas.height * 2,
                    z: Math.random() * canvas.width,
                    color: Math.random() > 0.4 ? '#d0bcff' : '#ffffff'
                });
            }
            
            let speed = 0.5;
            let acc = 0.2;
            let flash = 0;
            
            document.querySelector('.container').style.transition = 'transform 2s cubic-bezier(0.1, 0.7, 0.1, 1), opacity 2s, filter 2s';
            document.querySelector('.container').style.transform = 'scale(0.01) rotate(45deg)';
            document.querySelector('.container').style.opacity = '0';
            document.querySelector('.container').style.filter = 'blur(30px)';
            
            function animate() {
                ctx.fillStyle = `rgba(11, 11, 18, 0.2)`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                speed += acc;
                acc += 0.05;
                
                ctx.translate(cx, cy);
                
                stars.forEach(star => {
                    star.z -= speed;
                    if (star.z <= 0) {
                        star.x = (Math.random() - 0.5) * canvas.width * 2;
                        star.y = (Math.random() - 0.5) * canvas.height * 2;
                        star.z = canvas.width;
                    }
                    
                    let px = (star.x / star.z) * cx;
                    let py = (star.y / star.z) * cy;
                    
                    let pz = star.z + speed;
                    let ppx = (star.x / pz) * cx;
                    let ppy = (star.y / pz) * cy;
                    
                    ctx.beginPath();
                    ctx.moveTo(ppx, ppy);
                    ctx.lineTo(px, py);
                    ctx.strokeStyle = star.color;
                    ctx.lineWidth = Math.max(0.1, (canvas.width - star.z) / 100);
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = star.color;
                    ctx.stroke();
                });
                
                ctx.translate(-cx, -cy);
                
                if (speed > 80) {
                    flash += 0.05;
                    ctx.fillStyle = `rgba(208, 188, 255, ${flash})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    if (flash >= 1.2) {
                        window.location.href = url;
                        return;
                    }
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
        });
    </script>
</body>
</html>
